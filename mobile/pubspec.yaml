name: fleetpulse_mobile
description: Fleet tracking mobile app for drivers and dispatchers.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  web_socket_channel: ^2.4.0
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
